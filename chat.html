<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | PixelStudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #9200ff;
            --dark-bg: #030712;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
        }
        /* Sidebar */
        .chat-sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .chat-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        /* Poruke */
        .chat-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
        }
        .message {
            max-width: 70%;
            margin-bottom: 20px;
            padding: 15px 20px;
            border-radius: 20px;
        }
        .received {
            background: var(--glass);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .sent {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: black;
            font-weight: 500;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        /* Input zona */
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: rgba(3, 7, 18, 0.8);
        }
        .input-group {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 5px;
        }
        .chat-input {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 20px;
        }
        .chat-input:focus {
            background: transparent;
            color: white;
            box-shadow: none;
        }
        .btn-send {
            background: var(--primary);
            border-radius: 12px;
            color: black;
            border: none;
            width: 45px;
        }
    </style>
</head>
<body>

    <aside class="chat-sidebar d-none d-md-flex">
        <h4 class="fw-bold mb-4">Pixel<span style="color:var(--primary)">Chat</span></h4>
        <div class="list-group list-group-flush">
            <button class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 active" style="background: var(--glass) !important; border-radius: 12px;">
                <i class="fas fa-circle text-success me-2" style="font-size: 8px;"></i> Tehnička podrška
            </button>
            <button class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 opacity-50">
                Projekat: Web Shop
            </button>
        </div>
        <div class="mt-auto">
            <a href="index.html" class="text-white opacity-50 text-decoration-none small">Odjavi se</a>
        </div>
    </aside>

    <main class="chat-main">
        <header class="p-3 border-bottom border-secondary border-opacity-25 d-flex justify-content-between align-items-center">
            <h6 class="mb-0">Aktivna sesija: #7421</h6>
            <span class="badge rounded-pill bg-primary text-dark">Online</span>
        </header>

        <div class="chat-content d-flex flex-column">
            <div class="message received">
                Zdravo! Kako možemo pomoći u razvoju vaše digitalne ideje danas?
            </div>
            <div class="message sent">
                Pozdrav, hteo bih da proverim status dizajna za moju novu aplikaciju.
            </div>
            <div class="message received">
                Naravno! Dizajner upravo završava prototip. Biće spreman za pregled do kraja dana.
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-group">
                <input type="text" class="form-control chat-input" placeholder="Napišite poruku...">
                <button class="btn btn-send"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

</body>
</html>
