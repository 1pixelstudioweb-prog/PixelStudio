<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PixelStudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00d2ff; --dark-bg: #030712; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--dark-bg); color: white; font-family: 'Outfit', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 3rem; border-radius: 30px; width: 90%; max-width: 400px; }
        .form-control { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; border-radius: 12px; padding: 12px; }
        .form-control:focus { background: rgba(255,255,255,0.1); color: white; border-color: var(--primary); box-shadow: none; }
        .btn-login { background: var(--primary); border: none; color: black; font-weight: 700; width: 100%; padding: 12px; border-radius: 12px; transition: 0.3s; text-decoration: none; display: block; text-align: center; }
        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3); color: black; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 class="text-center fw-bold mb-4">Prijavi se</h2>
        <form action="chat.html">
            <div class="mb-3">
                <label class="form-label small opacity-75">Email adresa</label>
                <input type="email" class="form-control" placeholder="admin@pixelstudio.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label small opacity-75">Lozinka</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Uloguj se</button>
            <p class="text-center mt-3 small opacity-50"><a href="index.html" class="text-white text-decoration-none">← Nazad na početnu</a></p>
        </form>
    </div>
</body>
</html>
